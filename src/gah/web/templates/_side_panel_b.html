<div class="b-panel-content"
     x-init="
       fetch('/api/filters/labels')
         .then(function(r){ return r.json(); })
         .then(function(d){ $store.b.labelsByKind = d; })
     ">
  <h3 class="side-panel-heading">{{ _("B 필터") }}</h3>

  {# ── 매칭 모드 (Task 3.4) ──────────────────────────────── #}
  <fieldset class="match-mode">
    <legend class="match-mode-legend">{{ _("매칭 모드") }}</legend>
    <label class="match-mode-option">
      <input type="radio" name="match_mode" value="all"
             x-model="$store.search.matchMode"
             @change="htmx.trigger('form.search-bar', 'submit')" />
      {{ _("AND") }}
    </label>
    <label class="match-mode-option">
      <input type="radio" name="match_mode" value="any"
             x-model="$store.search.matchMode"
             @change="htmx.trigger('form.search-bar', 'submit')" />
      {{ _("OR") }}
    </label>
    <label class="match-mode-option">
      <input type="radio" name="match_mode" value="none"
             x-model="$store.search.matchMode"
             @change="htmx.trigger('form.search-bar', 'submit')" />
      {{ _("NOT") }}
    </label>
  </fieldset>

  {# ── 라벨 검색 input (Task 3.5) ───────────────────────── #}
  <div class="label-filter-wrap">
    <input type="search"
           class="label-filter-input"
           x-model="$store.b.labelFilter"
           placeholder="{{ _('🔍 라벨 검색…') }}" />
  </div>

  {# ── 종류 탭 (Task 3.6) ───────────────────────────────── #}
  <nav class="kind-tabs">
    <button
      @click="$store.b.kindTab = 'sprite'"
      :class="{ active: $store.b.kindTab === 'sprite' }">
      {{ _("스프라이트") }}
    </button>
    <button
      @click="$store.b.kindTab = 'sheet'"
      :class="{ active: $store.b.kindTab === 'sheet' }">
      {{ _("시트") }}
    </button>
    <button
      @click="$store.b.kindTab = 'sound'"
      :class="{ active: $store.b.kindTab === 'sound' }">
      {{ _("사운드") }}
    </button>
  </nav>

  {# ── axis 칩 FlowLayout (Task 3.7) ───────────────────── #}
  <div class="axis-chips-area" id="axis-chips">
    <template x-for="axis in ($store.b.labelsByKind[$store.b.kindTab] || [])" :key="axis.axis">
      <div class="axis-group">
        <h4 x-text="axis.label_ko"></h4>
        <div class="chip-flow">
          <template x-for="label in axis.labels" :key="label.id">
            <button
              type="button"
              class="chip"
              :class="{
                active: $store.b.selectedLabels.includes(label.id),
                matched: $store.b.labelFilter && label.label_ko.toLowerCase().includes($store.b.labelFilter.toLowerCase())
              }"
              @click="toggleLabel(label.id)"
              x-text="label.label_ko">
            </button>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
  function toggleLabel(id) {
    var sel = Alpine.store('b').selectedLabels;
    var i = sel.indexOf(id);
    if (i >= 0) {
      sel.splice(i, 1);
    } else {
      sel.push(id);
    }
    // 즉시 검색 재호출
    htmx.trigger(document.querySelector('form.search-bar'), 'submit');
  }
</script>
